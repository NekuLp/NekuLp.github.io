<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketch Runner</title>
    <!-- Use local css just in case sketches need some reset -->
    <link rel="stylesheet" type="text/css" href="./style.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: transparent !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="p5.js"></script>
    <script src="js/addons/p5.sound.min.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sketchFile = urlParams.get('sketch');

        // Automatic Path Resolution for Subfolders
        const sketchPath = sketchFile && sketchFile.includes('/') 
            ? sketchFile.substring(0, sketchFile.lastIndexOf('/') + 1) 
            : '';

        if (sketchPath) {
            // Override p5 loading functions to support relative paths from subfolders
            const patchP5 = () => {
                const targets = ['loadShader', 'loadImage', 'loadSound', 'loadFont', 'loadJSON', 'loadTable', 'loadStrings', 'loadXML', 'loadBytes', 'loadModel'];
                targets.forEach(fn => {
                    if (p5.prototype[fn]) {
                        const original = p5.prototype[fn];
                        p5.prototype[fn] = function(...args) {
                            if (typeof args[0] === 'string') {
                                if (args[0].startsWith('./')) {
                                    args[0] = sketchPath + args[0].substring(2);
                                } else if (!args[0].startsWith(sketchPath) && !args[0].startsWith('/') && !args[0].startsWith('http') && !args[0].startsWith('data:')) {
                                    args[0] = sketchPath + args[0];
                                }
                            }
                            return original.apply(this, args);
                        };
                    }
                });
            };
            patchP5();
        }

        if (sketchFile) {
            // Mapping for sketches that need extra dependencies
            const dependencies = {
                'sketches/flow-agents/flow-agents.js': ['./sketches/flow-agents/particle.js']
            };

            const loadScript = (src) => {
                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = src;
                    script.onload = resolve;
                    script.onerror = (err) => {
                        console.error('Failed to load script:', src, err);
                        reject(err);
                    };
                    document.body.appendChild(script);
                });
            };

            const runSketch = async () => {
                // Track loading progress (simulation)
                let loadProgress = 0;
                let progressInterval = setInterval(() => {
                    loadProgress += Math.floor(Math.random() * 15) + 5;
                    if (loadProgress >= 90) loadProgress = 90;
                    window.parent.postMessage({ type: 'progress', value: loadProgress }, '*');
                }, 100);

                try {
                    // Load dependencies first if any
                    const extras = dependencies[sketchFile] || [];
                    for (const dep of extras) {
                        await loadScript(dep);
                    }

                    // Load the main sketch
                    await loadScript(sketchFile);

                    clearInterval(progressInterval);
                    window.parent.postMessage({ type: 'progress', value: 100 }, '*');
                    
                    setTimeout(() => {
                        window.parent.postMessage({ type: 'loaded', sketch: sketchFile }, '*');
                    }, 300);
                } catch (e) {
                    clearInterval(progressInterval);
                    console.error('Error loading sketch or dependencies:', e);
                }
            };

            runSketch();
        }

        // Forward scroll/swipe events to parent if they occur OUTSIDE the canvas
        window.addEventListener('wheel', (e) => {
            if (e.target.tagName.toLowerCase() !== 'canvas') {
                window.parent.postMessage({ type: 'drawerAction', deltaY: e.deltaY, isTouch: false }, '*');
            }
        }, {passive: true});

        let touchStartY = null;
        window.addEventListener('touchstart', (e) => {
            if (e.target.tagName.toLowerCase() !== 'canvas') {
                touchStartY = e.touches[0].clientY;
            } else {
                touchStartY = null;
            }
        }, {passive: true});

        window.addEventListener('touchend', (e) => {
            if (touchStartY !== null) {
                let touchEndY = e.changedTouches[0].clientY;
                let deltaY = touchStartY - touchEndY;
                window.parent.postMessage({ type: 'drawerAction', deltaY: deltaY, isTouch: true }, '*');
            }
        }, {passive: true});
    </script>
</body>
</html>
