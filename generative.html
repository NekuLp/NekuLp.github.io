<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" type="text/css" href="./style.css">
    <link rel="icon" href="./img/favicon2.png" type="image/x-icon" />
    <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/selectize.js/0.15.2/css/selectize.default.min.css"/>
    
    <style>
        .sketch-description {
            font-size: 1.4rem; /* Adjusted for their html { font-size: 62.5% } base */
            line-height: 1.5;
            margin-bottom: 12px;
            color: rgba(255, 255, 255, 0.9);
            font-family: 'Datatype', sans-serif;
            text-align: left;
        }
        .tooltip-divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            margin: 10px 0;
        }
        .tooltip-title {
            font-family: 'Rubik Mono One', sans-serif;
            font-size: 1.2rem;
            color: #d90080; /* Neon pink matching their content */
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(217, 0, 128, 0.4);
            text-align: left;
        }
        .controls-list {
            margin-top: 8px;
        }
    </style>
    
    <title>Pashekun's p5 vault - Generative</title>
</head>
<body class="theme-dark-sea">
    <nav class="neon-navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo glow-text hover">Pashekun</a>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link glow-text" data-i18n="nav.home">Inicio</a></li>
                <li><a href="generative.html" class="nav-link glow-text active" data-i18n="nav.generative">Generative</a></li>
                <li><a href="about.html" class="nav-link glow-text" data-i18n="nav.about">About</a></li>
                <li class="lang-picker">
                    <select id="lang-switch" class="lang-select">
                        <option value="es">ESP</option>
                        <option value="en">ENG</option>
                    </select>
                </li>
            </ul>
        </div>
    </nav>

    <main class="generative-layout gallery">
        <div class="viewer-container">
            <!-- Sketch Header (Title + Info) -->
            <div class="sketch-header">
                <div style="width: 40px; height: 40px; flex-shrink: 0;" class="spacer"></div>
                <h2 id="sketch-title" class="sketch-title glow-text fade-hidden"></h2>
                
                <div id="sketch-info-icon" class="sketch-info-icon fade-hidden">
                    <span class="info-icon-text">i</span>
                    <div class="sketch-tooltip" id="sketch-tooltip">
                        <!-- Dynamic controls go here -->
                    </div>
                </div>
            </div>

            <!-- Left Arrow -->
            <div class="nav-arrow prev" id="btn-prev" onclick="changeSketch(-1)">&#10094;</div>
            
            <!-- Loading High-Tech Overlay -->
            <div id="loading" class="loading-overlay fade-hidden">
                <div class="loader-percentage" id="loader-percent">0%</div>
                <div class="cyber-progress-container">
                    <div class="cyber-progress-fill" id="loader-fill"></div>
                </div>
            </div>

            <!-- iframe will switch per sketch -->
            <iframe id="sketch-viewer" class="sketch-iframe slide-center-transparent"></iframe>

            <!-- Right Arrow -->
            <div class="nav-arrow next" id="btn-next" onclick="changeSketch(1)">&#10095;</div>
        </div>

        <section class="sketch-list-section" id="sketch-drawer">
            <div class="toggle-controls-btn glow-text" id="toggle-drawer-btn" onclick="toggleDrawer()">
                <span id="drawer-icon">&#9650;</span> <span data-i18n="gen.sketches">Sketches</span>
            </div>
            <h2 class="glow-text sketch-list-title" data-i18n="gen.explore">Explore Gallery</h2>
            <ul class="sketch-list" id="sketch-list-ui">
                <!-- Dynamically generated list items -->
            </ul>
        </section>
    </main>
    
    <script>
        const sketches = [
            { 
                id: 'sketches/piramides-rojas-2.js', 
                name: 'Pirámides Rojas (Alt)',
                nameKey: 'sketch.name.piramides',
                controls: [
                    { icon: '🖱️(Click)', text: 'Genera nueva seed 🔄', textKey: 'ctrl.seed' },                    
                ]
            },
            { 
                id: 'sketches/BattleBackgrounds.js', 
                name: 'Battle Backgrounds', 
                controls: [
                    { icon: '🖱️(Click) o R', text: 'Genera nueva seed 🔄', textKey: 'ctrl.seed' },                    
                ]
            },
            { id: 'sketches/gises.js', 
                name: 'Gises',
                nameKey: 'sketch.name.gises',
                controls: [
                    { icon: '🖱️(Click)', text: 'Crea un agente random', textKey: 'ctrl.agent' },
                    { icon: 'S', text: 'Guardar PNG', textKey: 'ctrl.save' },
                    { icon: 'R', text: 'Reiniciar sketch 🔄', textKey: 'ctrl.restart' }
                ]
             },
            { 
                id: 'sketches/oscilacion-mak.js', 
                name: 'Oscilación MAK',
                nameKey: 'sketch.name.oscilacion',
                controls: [
                    { icon: '1/2', text: 'FreqX +/-', textKey: 'ctrl.freqx' },
                    { icon: '3/4', text: 'FreqY +/-', textKey: 'ctrl.freqy' },
                    { icon: '7/8', text: 'ModFreqX +/-', textKey: 'ctrl.modfreqx' },
                    { icon: '9/0', text: 'ModFreqY +/-', textKey: 'ctrl.modfreqy' },
                    { icon: '⬅️/➡️', text: 'Cambia Phi', textKey: 'ctrl.phi' },
                    { icon: 'S', text: 'Guardar PNG', textKey: 'ctrl.save' }
                ]
            },
            { 
                id: 'sketches/portal_gradient.js', 
                name: 'Portal Gradient',
                controls: [
                    { icon: '⬅️/➡️', text: 'Pausa / Play', textKey: 'ctrl.pauseplay' },
                    { icon: 'R', text: 'Reiniciar sketch 🔄', textKey: 'ctrl.restart' },
                    { icon: 'S', text: 'Guardar PNG', textKey: 'ctrl.save' }
                ]
            },
            { 
                id: 'sketches/portal_colores.js', 
                name: 'Portal Colores',
                controls: [
                    { icon: '⬅️/➡️', text: 'Pausa / Play', textKey: 'ctrl.pauseplay' },
                    { icon: 'R', text: 'Reiniciar sketch 🔄', textKey: 'ctrl.restart' },
                    { icon: 'S', text: 'Guardar PNG', textKey: 'ctrl.save' }
                ]
            },
            { 
                id: 'sketches/gradient-sine.js', 
                name: 'Gradient Sine',
                controls: [
                    { icon: 'R o Click', text: 'Reiniciar sketch 🔄', textKey: 'ctrl.restart' },
                    { icon: 'S', text: 'Guardar PNG', textKey: 'ctrl.save' }
                ]
            },
            
            { id: 'sketches/primitive_shapes_3d.js', name: 'Primitive Shapes 3D' },

            { 
                id: 'sketches/emsjaen.js', 
                name: 'Emsjaen',
                controls: [
                    { icon: '⬅️/➡️', text: 'Pausa / Play', textKey: 'ctrl.pauseplay' },
                    { icon: 'R', text: 'Reiniciar sketch 🔄', textKey: 'ctrl.restart' },
                    { icon: 'S', text: 'Guardar PNG', textKey: 'ctrl.save' }
                ]
            },
             { 
                id: 'sketches/3dgrid/sketch.js', 
                name: '3D Grid (Shaders)',
                description: 'Un grid 3D que se puede rotar con el mouse. La generación del grid esta basada en como se crean los identicons de perfiles como github',
                descKey: 'sketch.desc.3dgrid',
                controls: [
                    { icon: '🖱️', text: 'Orbit control para rotar', textKey: 'ctrl.orbit' },
                    { icon: 'R', text: 'Reiniciar sketch 🔄', textKey: 'ctrl.restart' }
                ]
            },
            
            { 
                id: 'sketches/melody_randomizer_visualizer.js', 
                name: 'Melody Randomizer',
                controls: [
                    { icon: '🔊', text: '¡Tiene sonido! Dale clic para generar una melodía', textKey: 'ctrl.audio' }
                ]
            },
            { id: 'sketches/melody_randomizer_vis_input.js', 
            description: 'Visualiza el audio que entra por el microfono',
            descKey: 'sketch.desc.mic',
            controls: [
                { icon: '🎤', text: 'Mandar audio por el microfono', textKey: 'ctrl.mic' },
            ],
            name: 'Melody Visualizer (Input)' 
            },
            { id: 'sketches/genuary-2024-1-particles.js', 
            name: 'Genuary 2024 - Particles, lots of them.' ,
            controls: [
                { icon: 'R', text: 'Reiniciar sketch 🔄', textKey: 'ctrl.restart' },
                { icon: 'S', text: 'Guardar PNG', textKey: 'ctrl.save' }
            ]
            },
            { id: 'sketches/genuary-2024-3-droste.js', 
            name: 'Genuary 2024 - Droste Effect' ,
            controls: [
                { icon: '⬅️/➡️', text: 'Pausa / Play', textKey: 'ctrl.pauseplay' },
                { icon: 'R', text: 'Reiniciar sketch 🔄', textKey: 'ctrl.restart' },
                { icon: 'S', text: 'Guardar PNG', textKey: 'ctrl.save' }
            ]
            },
            { id: 'sketches/genuary-2024-4-pixels.js', 
            name: 'Genuary 2024 - Pixels' ,
            controls: [                                
                { icon: 'R', text: 'Reiniciar sketch 🔄', textKey: 'ctrl.restart' },
                { icon: 'S', text: 'Guardar PNG', textKey: 'ctrl.save' }
            ]
            },
            { id: 'sketches/flow-agents/flow-agents.js', 
            name: 'Flow Agents' ,
            controls: [                                
            ]
            },
            { id: 'sketches/test-unnamed.js', 
            name: 'Test Unnamed' ,
            description: 'Gusanitos que parecen doodles de dibujo a mano',
            descKey: 'sketch.desc.gusanitos',
            controls: [          
                { icon: 'R o click', text: 'Reiniciar sketch 🔄', textKey: 'ctrl.restart' },
                { icon: 'S', text: 'Guardar PNG', textKey: 'ctrl.save' }                      
            ]
            },
            { id: 'sketches/oil-paint-2.js', 
            name: 'Oil Paint 2' ,
            description: 'Genuary 2025 - Oil Paint',
            controls: [          
                { icon: 'R', text: 'Reiniciar sketch 🔄', textKey: 'ctrl.restart' },
                { icon: 'S', text: 'Guardar PNG', textKey: 'ctrl.save' }                      
            ]
            },
            { id: 'sketches/palette-cycling-lava.js', 
            name: 'Palette Cycling Lava' ,
            description: 'Usando técnicas este sketch simula el palette cycling que se usaba en los 90s para simular lava en videojuegos de supernintendo y similares. Agentes aparecen aleatoriamente, tanto como su forma tambien es aleatoria lo que hace simular un poco como crateres.',
            descKey: 'sketch.desc.lava',
            controls: [          
                { icon: 'R', text: 'Reiniciar sketch 🔄', textKey: 'ctrl.restart' },
                { icon: 'S', text: 'Guardar PNG', textKey: 'ctrl.save' }                      
            ]
            }
        ];

        let currentIndex = 0;
        let isTransitioning = false;
        
        const iframe = document.getElementById('sketch-viewer');
        const loader = document.getElementById('loading');
        const loaderPercent = document.getElementById('loader-percent');
        const loaderFill = document.getElementById('loader-fill');
        const listUI = document.getElementById('sketch-list-ui');
        const titleEl = document.getElementById('sketch-title');
        const infoIcon = document.getElementById('sketch-info-icon');
        const tooltipContainer = document.getElementById('sketch-tooltip');
        const drawer = document.getElementById('sketch-drawer');
        const drawerIcon = document.getElementById('drawer-icon');

        function toggleDrawer() {
            drawer.classList.toggle('show');
            if (drawer.classList.contains('show')) {
                drawerIcon.innerHTML = '&#9660;'; // Point down
            } else {
                drawerIcon.innerHTML = '&#9650;'; // Point up
            }
        }

        // Helper string logic
        const getT = (key, fallback) => {
            if (!key) return fallback;
            return window.t && window.t(key) !== key ? window.t(key) : fallback;
        };

        function initList() {
            listUI.innerHTML = ''; // Limpiar lista
            sketches.forEach((s, i) => {
                const li = document.createElement('li');
                li.className = 'sketch-item glow-text';
                li.innerText = getT(s.nameKey, s.name);
                li.onclick = () => loadSketch(i, i > currentIndex ? 1 : -1);
                listUI.appendChild(li);
            });
        }
        
        window.addEventListener('languageChanged', () => {
            initList();
            updateListHighlight();
            const currentSketch = sketches[currentIndex];
            titleEl.innerText = getT(currentSketch.nameKey, currentSketch.name);
            
            // Cierra el tooltip temporalmente si cambian de idioma para que no haya textos colgados o recargarlo
            if (infoIcon.classList.contains('auto-show') || !infoIcon.classList.contains('fade-hidden')) {
               // Renderizar tooltip de nuevo dinámicamente:
               renderTooltip(currentSketch);
            }
        });

        function updateListHighlight() {
            Array.from(listUI.children).forEach((li, i) => {
                if(i === currentIndex) {
                    li.classList.add('active-sketch');
                } else {
                    li.classList.remove('active-sketch');
                }
            });
        }

        function changeSketch(direction) {
            if (isTransitioning) return;
            let nextIndex = currentIndex + direction;
            if (nextIndex < 0) nextIndex = sketches.length - 1;
            if (nextIndex >= sketches.length) nextIndex = 0;
            
            loadSketch(nextIndex, direction);
        }

        function loadSketch(index, direction) {
            if(index === currentIndex && iframe.src.includes(sketches[index].id)) return;
            isTransitioning = true;
            currentIndex = index;
            updateListHighlight();

            // Fade out title and info icon
            titleEl.classList.add('fade-hidden');
            infoIcon.classList.add('fade-hidden');

            // Slide out current sketch
            if (direction > 0) {
                iframe.className = 'sketch-iframe slide-out-left';
            } else {
                iframe.className = 'sketch-iframe slide-out-right';
            }

            // Show Loader with a slight delay to let the active sketch leave first
            setTimeout(() => {
                loader.classList.remove('fade-hidden');
            }, 300);
            
            loaderPercent.innerText = '0%';
            loaderFill.style.width = '0%';

            setTimeout(() => {
                // Disable css transition to instantly snap to center
                iframe.style.transition = 'none';
                iframe.className = 'sketch-iframe slide-center-transparent';
                
                // Change src 
                iframe.src = `sketch-runner.html?sketch=${sketches[currentIndex].id}`;
                
                // Restore transition capabilities in next frame
                requestAnimationFrame(() => {
                    iframe.style.transition = '';
                });
                
            }, 600); // match CSS transition duration
        }

        function renderTooltip(currentSketch) {
            let tooltipContent = '';
            const currentDesc = getT(currentSketch.descKey, currentSketch.description);

            if (currentDesc) {
                const descTitle = window.t ? window.t('gen.desc') : 'Descripción';
                tooltipContent += `<h4 class="tooltip-title" data-i18n="gen.desc">${descTitle}</h4>`;
                tooltipContent += `<p class="sketch-description">${currentDesc}</p>`;
                if (currentSketch.controls && currentSketch.controls.length > 0) {
                    tooltipContent += '<hr class="tooltip-divider">';
                }
            }

            if (currentSketch.controls && currentSketch.controls.length > 0) {
                const controlsTitle = window.t ? window.t('gen.controls') : 'Controles';
                tooltipContent += `<h4 class="tooltip-title" data-i18n="gen.controls">${controlsTitle}</h4>`;
                tooltipContent += '<ul class="controls-list">' + currentSketch.controls.map(c => 
                    `<li class="control-item">
                        <span class="control-icon">${c.icon}</span>
                        <span class="control-text">${getT(c.textKey, c.text)}</span>
                    </li>`
                ).join('') + '</ul>';
            }

            tooltipContainer.innerHTML = tooltipContent;
            
            if (currentDesc || (currentSketch.controls && currentSketch.controls.length > 0)) {
                infoIcon.classList.remove('fade-hidden');
            } else {
                infoIcon.classList.add('fade-hidden');
            }
        }

        // Listen for postMessage from iframe
        window.addEventListener('message', (event) => {
            if (!event.data) return;
            
            if (event.data.type === 'progress') {
                loaderPercent.innerText = `${event.data.value}%`;
                loaderFill.style.width = `${event.data.value}%`;
            } else if (event.data.type === 'loaded') {
                const currentSketch = sketches[currentIndex];
                titleEl.innerText = getT(currentSketch.nameKey, currentSketch.name);
                loaderPercent.innerText = '100%';
                loaderFill.style.width = '100%';
                
                renderTooltip(currentSketch);
                
                setTimeout(() => {
                    loader.classList.add('fade-hidden');
                    titleEl.classList.remove('fade-hidden');
                    
                    const currentDesc = getT(currentSketch.descKey, currentSketch.description);
                    if (currentDesc || (currentSketch.controls && currentSketch.controls.length > 0)) {
                        // Auto-show tooltip for 2 seconds
                        tooltipContainer.classList.add('auto-show');
                        setTimeout(() => {
                            tooltipContainer.classList.remove('auto-show');
                        }, 2000);
                    }
                    
                    // Small delay to ensure browser paints before translating to center
                    requestAnimationFrame(() => {
                        iframe.className = 'sketch-iframe slide-center';
                        
                        setTimeout(() => {
                           // Transition done
                           isTransitioning = false; 
                        }, 600);
                    });
                }, 500);
            } else if (event.data.type === 'drawerAction') {
                let deltaY = event.data.deltaY;
                let isTouch = event.data.isTouch;
                
                if (isTouch) {
                    if (deltaY > 50 && !drawer.classList.contains('show')) { 
                        toggleDrawer();
                    } else if (deltaY < -50 && drawer.classList.contains('show')) { 
                        toggleDrawer();
                    }
                } else {
                    if (deltaY > 0 && !drawer.classList.contains('show')) {
                        toggleDrawer();
                    } else if (deltaY < 0 && drawer.classList.contains('show')) {
                        toggleDrawer();
                    }
                }
            }
        });

        // Initialize First
        initList();
        
        // Setup initial without transition
        loader.classList.remove('fade-hidden');
        titleEl.innerText = getT(sketches[currentIndex].nameKey, sketches[currentIndex].name);
        iframe.src = `sketch-runner.html?sketch=${sketches[currentIndex].id}`;
        updateListHighlight();

        // Mouse Wheel integration
        window.addEventListener('wheel', (e) => {
            if (e.deltaY > 0 && !drawer.classList.contains('show')) {
                // Scrolled down -> open drawer
                toggleDrawer();
            } else if (e.deltaY < 0 && drawer.classList.contains('show')) {
                // Scrolled up -> close drawer
                toggleDrawer();
            }
        }, {passive: true});

        // Touch swipe integration for mobile
        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        }, {passive: true});
        
        window.addEventListener('touchend', (e) => {
            let touchEndY = e.changedTouches[0].clientY;
            let deltaY = touchStartY - touchEndY;
            // deltaY > 50 means user swiped finger UP the screen (scrolling down)
            if (deltaY > 50 && !drawer.classList.contains('show')) { 
                toggleDrawer();
            } else if (deltaY < -50 && drawer.classList.contains('show')) { 
                toggleDrawer();
            }
        }, {passive: true});

    </script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/selectize.js/0.15.2/js/selectize.min.js"></script>
    <script type="module" src="js/i18n.js"></script>
</body>
</html>
